<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0f">
<title>IRON LOG</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230d0d0f'/%3E%3Ctext x='90' y='118' font-size='80' text-anchor='middle' fill='%23e8c84a' font-family='Arial Black'%3EIL%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0d0d0f; --panel:#16161a; --panel2:#1d1d23; --line:#2a2a32;
  --gold:#e8c84a; --gold-dim:#9a8534; --txt:#f2f0e9; --mut:#8b8b95;
  --green:#5dc878; --red:#e06060; --blue:#6aa6e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'SF Pro Text',Helvetica,Arial,sans-serif;font-size:16px;height:100%;overscroll-behavior:none}
body{padding-bottom:calc(70px + env(safe-area-inset-bottom))}
h1,h2,h3,.num{font-family:-apple-system,'SF Pro Display',Helvetica,Arial,sans-serif}
header{position:sticky;top:0;z-index:50;background:rgba(13,13,15,.92);backdrop-filter:blur(12px);padding:calc(10px + env(safe-area-inset-top)) 18px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
header h1{font-size:17px;letter-spacing:3px;font-weight:800}
header h1 b{color:var(--gold)}
#profBtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:5px 12px;font-size:13px}
main{padding:16px 16px 30px;max-width:560px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.card h2{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:12px;font-weight:600}
.card h3{font-size:16px;margin-bottom:6px}
.mut{color:var(--mut);font-size:13px}
.sm{font-size:13px}
button{font-family:inherit;cursor:pointer}
.btn{display:block;width:100%;background:var(--gold);color:#141204;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;margin-top:10px}
.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line);font-weight:600}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn.sm2{padding:9px;font-size:14px;margin-top:8px}
.btn:disabled{opacity:.4}
.row{display:flex;gap:10px;align-items:center}
.row .btn{margin-top:10px}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px;font-size:16px;font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-dim)}
label.fld{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px;letter-spacing:.5px}
/* Meso-Band */
.band{display:flex;gap:5px;margin:8px 0 4px}
.band .seg{flex:1;height:34px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.5px;position:relative}
.band .seg.done{background:#23231a;border-color:var(--gold-dim);color:var(--gold-dim)}
.band .seg.cur{background:var(--gold);border-color:var(--gold);color:#141204}
.band .seg.deload{font-style:italic}
.daychips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;color:var(--txt)}
.chip.done{border-color:var(--green);color:var(--green)}
.chip.active{border-color:var(--gold);color:var(--gold)}
/* Workout */
.exblock{border-top:1px solid var(--line);padding:14px 0}
.exblock:first-of-type{border-top:none;padding-top:4px}
.exhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.exhead .nm{font-weight:700;font-size:16px}
.exhead .eq{font-size:11px;color:var(--mut)}
.target{font-size:13px;color:var(--gold);margin:3px 0 8px;font-weight:600}
.setrow{display:grid;grid-template-columns:34px 1fr 1fr 1fr 40px;gap:7px;align-items:center;margin-bottom:7px}
.setrow .si{color:var(--mut);font-size:13px;text-align:center}
.setrow input{padding:9px 6px;text-align:center;font-size:16px}
.setrow .ok{width:40px;height:40px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);font-size:17px}
.setrow .ok.on{background:var(--green);border-color:var(--green);color:#0b1a0f}
.collbl{display:grid;grid-template-columns:34px 1fr 1fr 1fr 40px;gap:7px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;text-align:center}
.hint{background:#23231a;border:1px solid var(--gold-dim);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--gold);margin-top:6px}
.warn{background:#241719;border:1px solid #5a3035;border-radius:10px;padding:9px 12px;font-size:13px;color:var(--red);margin-top:6px}
.good{background:#15231a;border:1px solid #2d5a3a;border-radius:10px;padding:9px 12px;font-size:13px;color:var(--green);margin-top:6px}
/* Tabs */
nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(13,13,15,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--mut);padding:11px 0 9px;font-size:11px;letter-spacing:.5px}
nav button .ic{display:block;font-size:20px;margin-bottom:2px}
nav button.on{color:var(--gold)}
/* Modal */
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center}
.modal .box{background:var(--panel);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:88vh;overflow:auto}
.modal h3{font-size:18px;margin-bottom:4px}
.slider-row{margin:14px 0}
.slider-row .lbl{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.slider-row .lbl b{color:var(--gold)}
input[type=range]{padding:0;height:34px;background:transparent;border:none}
input[type=range]::-webkit-slider-runnable-track{height:6px;background:var(--panel2);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--gold);margin-top:-10px}
.seg2{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:6px}
.seg2 button{flex:1;background:none;border:none;color:var(--mut);padding:10px;font-size:14px;font-weight:600}
.seg2 button.on{background:var(--gold);color:#141204}
.listitem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);gap:10px}
.listitem:last-child{border-bottom:none}
.listitem .ttl{font-weight:600;font-size:15px}
.listitem .sub{font-size:12px;color:var(--mut)}
.mini{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 11px;font-size:13px;white-space:nowrap}
.mini.gold{color:var(--gold);border-color:var(--gold-dim)}
.mini.red{color:var(--red)}
.tag{display:inline-block;font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--mut);margin-left:6px;vertical-align:middle}
.tag.g{color:var(--blue);border-color:#2c4a66}
.tag.i{color:#c79be0;border-color:#4c3a5e}
.big{font-size:34px;font-weight:800;letter-spacing:-1px}
.kpis{display:flex;gap:10px;margin-top:8px}
.kpi{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.kpi .v{font-size:20px;font-weight:800;color:var(--gold)}
.kpi .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
textarea{min-height:170px;font-family:ui-monospace,Menlo,monospace;font-size:13px}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--gold);color:#141204;padding:10px 18px;border-radius:24px;font-size:14px;font-weight:700;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:88%;text-align:center}
details{border-top:1px solid var(--line);padding:10px 0}
details summary{font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;cursor:pointer}
details summary::after{content:'›';color:var(--mut);transform:rotate(90deg)}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:14px}
</style>
</head>
<body>
<header><h1>IRON<b>LOG</b></h1><button id="profBtn" onclick="profileMenu()">Profil</button></header>
<main id="app"></main>
<nav>
<button id="tb-home" onclick="go('home')"><span class="ic">◆</span>Start</button>
<button id="tb-train" onclick="go('train')"><span class="ic">▣</span>Training</button>
<button id="tb-plan" onclick="go('plan')"><span class="ic">≡</span>Plan</button>
<button id="tb-more" onclick="go('more')"><span class="ic">⋯</span>Mehr</button>
</nav>
<div id="modal"></div>
<script>
/* ============ STORAGE ============ */
const KEY='ironlog_v1';
let S=null;
function load(){try{S=JSON.parse(localStorage.getItem(KEY))}catch(e){S=null}
  if(!S){S={profiles:[],active:null,data:{}};}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function P(){return S.data[S.active]}
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const r25=w=>Math.max(0,Math.round(w/2.5)*2.5);
const fmtW=w=>(w%1?w.toFixed(1):w)+' kg';

/* ============ SEED ============ */
function seedExercises(){
  const mk=(name,muscle,type,equipment)=>({id:uid(),name,muscle,type,equipment});
  return [
   mk('Brustpresse (flach)','Brust','grund','PrimeFitnessUSA'),
   mk('Brustpresse (schräg)','Brust','grund','Panatta'),
   mk('Flys (Maschine)','Brust','iso','Hammer Strength'),
   mk('Brosep Flys (Kurzhantel)','Brust','iso','Kurzhanteln'),
   mk('Super Incline (Multipresse)','Brust','grund','Cybex'),
   mk('Überzüge','Lat','iso','Panatta'),
   mk('Trapez Rudern (breit)','Rücken','grund','Gym80 / Watson'),
   mk('T-Bar Rudern','Rücken','grund','Gym80 / Watson'),
   mk('Latzug (eng)','Lat','grund','Panatta'),
   mk('Latzug (breit)','Lat','grund','Panatta'),
   mk('Lat Rudern (eng)','Lat','grund','Hammer Strength'),
   mk('Seitheben (stehend)','Schulter','iso','Watson'),
   mk('Seitheben (Kabelturm)','Schulter','iso','Free Motion'),
   mk('Butterfly Reverse','Hintere Schulter','iso','Panatta'),
   mk('Trizeps (Oberarm oben)','Trizeps','iso','Gym80'),
   mk('Trizeps (Oberarm unten)','Trizeps','iso','Kabelturm'),
   mk('Preacher Curls (weggedreht)','Bizeps','iso','Panatta'),
   mk('Curls (hinter dem Körper)','Bizeps','iso','PrimeFitnessUSA'),
   mk('Hackenschmidt','Quads','grund','Revive'),
   mk('Beinpresse (einbeinig)','Quads','grund','Panatta'),
   mk('Beinstrecker (nach hinten gelehnt)','Quads','iso','PrimeFitnessUSA'),
   mk('RDLs (Knie leicht gebeugt)','Beuger','grund','Eleiko'),
   mk('Beinbeuger (sitzend)','Beuger','iso','Cybex'),
   mk('Beinbeuger (liegend)','Beuger','iso','Gym80'),
   mk('Adduktoren','Adduktoren','iso','Cybex'),
   mk('Wadenheben (stehend)','Waden','iso','Hammer Strength'),
   mk('Bauchpresse','Bauch','iso','Hammer Strength'),
   mk('Bankdrücken (Langhantel)','Brust','grund','Langhantel'),
   mk('Kniebeuge','Quads','grund','Langhantel'),
   mk('Kreuzheben','Beuger','grund','Langhantel'),
   mk('Klimmzüge','Lat','grund','Körpergewicht'),
   mk('Schulterdrücken (KH)','Schulter','grund','Kurzhanteln'),
  ];
}
function seedPlan(ex){
  const f=n=>ex.find(e=>e.name===n).id;
  const sl=(n,sets,reps,scheme,extra)=>Object.assign({exId:f(n),sets,reps,scheme:scheme||'straight'},extra||{});
  return {id:uid(),name:'OK/UK Plan',days:[
   {name:'OK A',slots:[
     sl('Brustpresse (flach)',2,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Trapez Rudern (breit)',3,'6-8'),
     sl('Brustpresse (schräg)',2,'6-8'),
     sl('Latzug (eng)',3,'6-8'),
     sl('Flys (Maschine)',3,'6-8'),
     sl('Lat Rudern (eng)',3,'6-8'),
     sl('Seitheben (stehend)',5,'6-8'),
     sl('Butterfly Reverse',2,'6-8'),
     sl('Trizeps (Oberarm oben)',4,'6-8'),
     sl('Preacher Curls (weggedreht)',4,'6-8'),
   ]},
   {name:'UK A',slots:[
     sl('Wadenheben (stehend)',4,'AMRAP','amrap'),
     sl('Hackenschmidt',3,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Adduktoren',1,'6-8'),
     sl('Beinstrecker (nach hinten gelehnt)',3,'6-8'),
     sl('RDLs (Knie leicht gebeugt)',2,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Beinbeuger (sitzend)',2,'6-8'),
     sl('Beinbeuger (liegend)',2,'6-8'),
     sl('Bauchpresse',4,'6-8'),
   ]},
   {name:'OK B',slots:[
     sl('T-Bar Rudern',2,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Latzug (breit)',3,'8-10'),
     sl('Überzüge',3,'8-10'),
     sl('Super Incline (Multipresse)',2,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Flys (Maschine)',4,'8-10'),
     sl('Brosep Flys (Kurzhantel)',2,'8-10'),
     sl('Seitheben (Kabelturm)',5,'8-10'),
     sl('Trizeps (Oberarm unten)',4,'8-10'),
     sl('Curls (hinter dem Körper)',4,'8-10'),
     sl('Butterfly Reverse',2,'8-10'),
   ]},
   {name:'UK B',slots:[
     sl('RDLs (Knie leicht gebeugt)',2,'8-10','tb',{topReps:'5-6',topSets:1}),
     sl('Beinbeuger (sitzend)',2,'8-10'),
     sl('Beinstrecker (nach hinten gelehnt)',3,'8-10'),
     sl('Beinbeuger (liegend)',2,'8-10'),
     sl('Beinpresse (einbeinig)',3,'8-10'),
     sl('Adduktoren',1,'8-10'),
     sl('Bauchpresse',4,'8-10'),
     sl('Wadenheben (stehend)',4,'AMRAP','amrap'),
   ]},
  ]};
}
function newProfileData(){
  const ex=seedExercises();
  return {exercises:ex,plans:[seedPlan(ex)],cycle:null,history:[]};
}

/* ============ MESO LOGIK ============ */
const WEEKS=['Woche 1','Woche 2','Woche 3','Woche 4','Deload'];
const RIR_TARGET=[2,2,1,1,4]; // pro Woche (Index 0-4)
const WEEK_INFO=[
 'Einstieg nach Deload. Leichter Muskelkater ist erwünscht. RIR 2.',
 'Akkumulation. Volumen/Stress steigt. RIR 2.',
 'Akkumulation. Härter rangehen. RIR 1.',
 'Overreaching. Alles geben — RIR 0-1, Koffein & laute Mukke erlaubt.',
 'Deload. Halbes Volumen, leichte Gewichte, Erschöpfung abbauen.'
];
function parseReps(r){const m=String(r).match(/(\d+)\s*-\s*(\d+)/);return m?[+m[1],+m[2]]:[+r||8,+r||8]}
// Epley: e1RM = w * (1 + reps/30)  ->  w für (reps+RIR) Gesamtkapazität
function calcW(e1,reps,rir){return r25(e1*30/(30+reps+rir))}
function obsE1(w,reps,rir){return w*(1+(reps+(rir||0))/30)}
function presc(slot,week){
  const c=P().cycle, e1=c.e1rm[slot.exId];
  const deload=week===4;
  const rir=RIR_TARGET[week];
  let sets=slot.sets+(c.volAdjust[exType(slot.exId)]||0);
  sets=Math.max(1,sets);
  if(deload) sets=Math.max(1,Math.ceil(sets/2));
  if(slot.scheme==='amrap') return {amrap:true,sets,rir:null};
  if(e1==null) return {needCal:true,sets,rir,slot};
  const dl=deload?0.9:1; // Deload zusätzlich über RIR4 + leichten Abschlag
  if(slot.scheme==='tb'){
    const [tl]=parseReps(slot.topReps),[bl]=parseReps(slot.reps);
    return {sets,rir,topSets:deload?0:(slot.topSets||1),
      topW:r25(calcW(e1,tl,rir)*dl),topReps:slot.topReps,
      backW:r25(calcW(e1,bl,rir)*dl),backReps:slot.reps};
  }
  const [lo]=parseReps(slot.reps);
  return {sets,rir,w:r25(calcW(e1,lo,rir)*dl),reps:slot.reps};
}
function exType(exId){const e=P().exercises.find(x=>x.id===exId);return e?e.type:'iso'}
function exName(exId){const e=P().exercises.find(x=>x.id===exId);return e?e.name:'?'}
function exObj(exId){return P().exercises.find(x=>x.id===exId)}

/* Auto-Anpassung nach Einheit */
function autoAdjust(session){
  const c=P().cycle, msgs=[];
  const byEx={};
  session.entries.forEach(en=>{
    const done=en.sets.filter(s=>s.done&&s.w>0&&s.reps>0);
    if(!done.length)return;
    byEx[en.exId]=done;
  });
  Object.entries(byEx).forEach(([exId,sets])=>{
    const slot=currentPlan().days[session.dayIdx].slots.find(s=>s.exId===exId);
    if(!slot||slot.scheme==='amrap')return;
    if(c.e1rm[exId]==null){ // Kalibrierung: aus erstem Training e1RM ableiten
      const best=Math.max(...sets.map(s=>obsE1(s.w,s.reps,s.rir??2)));
      c.e1rm[exId]=Math.round(best*10)/10;
      msgs.push(exName(exId)+': kalibriert ('+fmtW(r25(c.e1rm[exId]))+' e1RM)');
      return;
    }
    const stored=c.e1rm[exId];
    const avg=sets.reduce((a,s)=>a+obsE1(s.w,s.reps,s.rir??RIR_TARGET[session.week]),0)/sets.length;
    const ratio=avg/stored;
    c.flags=c.flags||{};
    if(ratio>1.04){
      if(c.flags[exId]==='hi'){ c.e1rm[exId]=Math.round(avg*0.98*10)/10; c.flags[exId]=null;
        msgs.push(exName(exId)+': zu leicht → e1RM erhöht, Gewichte steigen'); }
      else c.flags[exId]='hi';
    } else if(ratio<0.94){
      if(c.flags[exId]==='lo'){ c.e1rm[exId]=Math.round(avg*1.0*10)/10; c.flags[exId]=null;
        msgs.push(exName(exId)+': zu schwer → e1RM reduziert, Gewichte sinken'); }
      else c.flags[exId]='lo';
    } else c.flags[exId]=null;
  });
  return msgs;
}

/* ============ NAVIGATION ============ */
let view='home', wkDay=null;
function go(v){view=v;render()}
function render(){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  const tb=document.getElementById('tb-'+(view==='train'?'train':view));
  if(tb)tb.classList.add('on');
  const app=document.getElementById('app');
  if(!S.active){app.innerHTML=vProfileSetup();return}
  if(view==='home')app.innerHTML=vHome();
  else if(view==='train')app.innerHTML=vTrain();
  else if(view==='plan')app.innerHTML=vPlan();
  else if(view==='more')app.innerHTML=vMore();
  window.scrollTo(0,0);
}
function toast(t){const d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2600)}
function modal(html){document.getElementById('modal').innerHTML='<div class="modal" onclick="if(event.target===this)closeModal()"><div class="box">'+html+'</div></div>'}
function closeModal(){document.getElementById('modal').innerHTML=''}

/* ============ PROFILE ============ */
function vProfileSetup(){
  return `<div class="card"><h2>Willkommen</h2><h3>Wer trainiert?</h3>
  <p class="mut">Lege ein Profil an. Alle Daten bleiben auf diesem iPhone.</p>
  <label class="fld">Name</label><input id="pname" placeholder="z.B. Kappuzino">
  <button class="btn" onclick="addProfile()">Profil erstellen</button></div>`;
}
function addProfile(nameFromMenu){
  const name=nameFromMenu||document.getElementById('pname').value.trim();
  if(!name)return;
  const id=uid();S.profiles.push({id,name});S.data[id]=newProfileData();S.active=id;save();closeModal();render();
}
function profileMenu(){
  if(!S.profiles.length)return;
  let h='<h3>Profile</h3>';
  S.profiles.forEach(p=>{h+=`<div class="listitem"><div class="ttl">${esc(p.name)}${p.id===S.active?' <span class="tag" style="color:var(--gold)">aktiv</span>':''}</div>
   <div class="row"><button class="mini gold" onclick="S.active='${p.id}';save();closeModal();render()">Wählen</button>
   ${S.profiles.length>1?`<button class="mini red" onclick="delProfile('${p.id}')">✕</button>`:''}</div></div>`});
  h+=`<label class="fld">Neues Profil</label><div class="row"><input id="npname" placeholder="Name">

function weekSessions(){const c=P().cycle;return c.sessions.filter(s=>s.week===c.week&&s.done)}

    </div>
    <div class="daychips">${plan.days.map((dy,i)=>`<span class="chip ${doneIdx.includes(i)?'done':''}">${doneIdx.includes(i)?'✓ ':''}${esc(dy.name)}</span>`).join('')}</div>

function startCycle(){

/* ============ TRAINING ============ */
let live=null; // {dayIdx, entries:[{exId, sets:[{w,reps,rir,done}]}]}
function vTrain(){
  const c=P().cycle;
  if(!c)return `<div class="empty">Kein aktiver Zyklus.<br>Starte zuerst einen Zyklus im Tab „Start".</div>`;
  const plan=currentPlan();
  if(!live){
    const doneIdx=weekSessions().map(s=>s.dayIdx);
    let h=`<div class="card"><h2>${WEEKS[c.week]} · Einheit wählen</h2>`;
    plan.days.forEach((dy,i)=>{
      h+=`<div class="listitem"><div><div class="ttl">${esc(dy.name)}</div><div class="sub">${dy.slots.length} Übungen${doneIdx.includes(i)?' · diese Woche erledigt':''}</div></div>
      <button class="mini ${doneIdx.includes(i)?'':'gold'}" onclick="startSession(${i})">${doneIdx.includes(i)?'Nochmal':'Start'}</button></div>`;
    });
    return h+'</div>';
  }
  return vLiveSession();
}
function startSession(dayIdx){
  const c=P().cycle, plan=currentPlan();
  live={dayIdx,week:c.week,date:new Date().toLocaleDateString('de-DE'),
    entries:plan.days[dayIdx].slots.map(slot=>{
      const pr=presc(slot,c.week);
      return {exId:slot.exId,sets:Array.from({length:pr.sets},()=>({w:'',reps:'',rir:'',done:false}))};
    })};
  render();
}
function vLiveSession(){
  const c=P().cycle, plan=currentPlan(), day=plan.days[live.dayIdx];
  let h=`<div class="card"><h2>${esc(day.name)} · ${WEEKS[c.week]}</h2>`;
  day.slots.forEach((slot,si)=>{
    const pr=presc(slot,c.week), ex=exObj(slot.exId), en=live.entries[si];
    h+=`<div class="exblock"><div class="exhead"><span class="nm">${esc(ex.name)}<span class="tag ${ex.type==='grund'?'g':'i'}">${ex.type==='grund'?'Grund':'Iso'}</span></span><span class="eq">${esc(ex.equipment||'')}</span></div>`;
    if(pr.amrap) h+=`<div class="target">${pr.sets}× AMRAP · Full ROM + Partials</div>`;
    else if(pr.needCal) h+=`<div class="target">Kalibrierung: Gewicht frei wählen, ${pr.sets}×${slot.scheme==='tb'?slot.topReps+' / '+slot.reps:slot.reps} · RIR ehrlich angeben</div>`;
    else if(pr.topSets!==undefined){
      h+=`<div class="target">${pr.topSets?`Top: ${pr.topSets}× ${fmtW(pr.topW)} × ${pr.topReps} · `:''}Backoff: ${pr.sets-(pr.topSets||0)}× ${fmtW(pr.backW)} × ${pr.backReps} · RIR ${pr.rir===1?'0-1':pr.rir}</div>`;
    } else h+=`<div class="target">${pr.sets}× ${fmtW(pr.w)} × ${pr.reps} Wdh · RIR ${pr.rir===1?'0-1':pr.rir}</div>`;
    h+=`<div class="collbl"><span>#</span><span>KG</span><span>WDH</span><span>RIR</span><span></span></div>`;
    en.sets.forEach((st,xi)=>{
      let ph=pr.amrap||pr.needCal?'':(pr.topSets!==undefined?(xi<(pr.topSets||0)?pr.topW:pr.backW):pr.w);
      h+=`<div class="setrow"><span class="si">${xi+1}</span>
      <input type="number" inputmode="decimal" placeholder="${ph}" value="${st.w}" onchange="setVal(${si},${xi},'w',this.value)">
      <input type="number" inputmode="numeric" placeholder="${pr.amrap?'max':''}" value="${st.reps}" onchange="setVal(${si},${xi},'reps',this.value)">
      <input type="number" inputmode="numeric" placeholder="${pr.rir??''}" value="${st.rir}" onchange="setVal(${si},${xi},'rir',this.value)" ${pr.amrap?'disabled':''}>
      <button class="ok ${st.done?'on':''}" onclick="tickSet(${si},${xi},${pr.amrap?'true':'false'},${pr.rir??'null'})">✓</button></div>`;
    });
    if(en.hint)h+=`<div class="hint">${en.hint}</div>`;
    h+='</div>';
  });
  h+=`<button class="btn" onclick="finishSession()">Einheit abschließen</button>
  <button class="btn sec sm2" onclick="if(confirm('Einheit verwerfen?')){live=null;render()}">Abbrechen</button></div>`;
  return h;
}
function setVal(si,xi,k,v){live.entries[si].sets[xi][k]=v===''?'':+v}
function tickSet(si,xi,amrap,targetRir){
  const st=live.entries[si].sets[xi];
  // Platzhalter übernehmen falls leer
  const inputs=document.querySelectorAll('.exblock')[si].querySelectorAll('.setrow')[xi].querySelectorAll('input');
  if(st.w==='')st.w=+inputs[0].placeholder||'';
  if(st.reps===''&&inputs[1].placeholder&&inputs[1].placeholder!=='max'){}
  if(st.rir===''&&!amrap&&targetRir!=null)st.rir=targetRir;
  st.done=!st.done;
  // Live-Hinweis: viel zu leicht?
  const en=live.entries[si];
  if(st.done&&!amrap&&targetRir!=null&&st.rir!==''&&st.rir>=targetRir+3&&st.w>0&&st.reps>0){
    const sug=r25(st.w*(30+st.reps+targetRir+3)/(30+st.reps+targetRir));
    en.hint='Deutlich zu leicht (RIR '+st.rir+'). Empfehlung für die nächsten Sätze: '+fmtW(sug);
  }
  render();
}
function finishSession(){
  const c=P().cycle;
  const session={date:live.date,week:live.week,dayIdx:live.dayIdx,entries:live.entries,done:true};
  c.sessions.push(session);
  const msgs=autoAdjust(session);
  live=null;save();
  if(msgs.length)modal('<h3>Automatische Anpassung</h3>'+msgs.map(m=>`<div class="good">${esc(m)}</div>`).join('')+'<button class="btn" onclick="closeModal()">OK</button>');
  else toast('Einheit gespeichert ✓');
  go('home');
}

/* ============ WOCHEN-EVALUATION ============ */
function openWeeklyEval(){
  const c=P().cycle;
  const sl=(id,lbl)=>`<div class="slider-row"><div class="lbl"><span>${lbl}</span><b id="v${id}">3</b></div>
  <input type="range" min="1" max="5" value="3" id="${id}" oninput="document.getElementById('v${id}').textContent=this.value"></div>`;
  modal(`<h3>${WEEKS[c.week]} abschließen</h3><p class="mut sm">Bewerte deinen Zustand (1 = schlecht · 5 = sehr gut).</p>
  ${sl('eSchlaf','Schlafqualität')}${sl('eMot','Motivation')}${sl('eWohl','Wohlbefinden')}${sl('eExp','Explosivität')}${sl('eKater','Muskelkater (5 = keiner)')}
  <label class="fld">Gefühl insgesamt diese Woche</label>
  <div class="seg2" id="feel"><button onclick="pick(this)" data-v="unter">Unterfordert</button><button class="on" onclick="pick(this)" data-v="ok">Passend</button><button onclick="pick(this)" data-v="ueber">Überfordert</button></div>
  <label class="fld">Konntest du dich steigern?</label>
  <div class="seg2" id="prog"><button class="on" onclick="pick(this)" data-v="ja">Ja</button><button onclick="pick(this)" data-v="nein">Nein</button></div>
  <button class="btn" onclick="applyWeeklyEval()">Auswerten & nächste Woche</button>`);
}
function pick(b){b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function segVal(id){return document.querySelector('#'+id+' button.on').dataset.v}
function applyWeeklyEval(){
  const c=P().cycle;
  const ev={schlaf:+eSchlaf.value,mot:+eMot.value,wohl:+eWohl.value,exp:+eExp.value,kater:+eKater.value,feel:segVal('feel'),prog:segVal('prog')};
  c.evals[c.week]=ev;
  // Entscheidungsbaum (Buch): Progression + Gefühl → Volumen
  let msg='Volumen bleibt unverändert.';
  if(ev.prog==='ja'&&ev.feel==='unter'){c.volAdjust.grund++;msg='Gute Progression, aber unterfordert → +1 Satz pro Grundübung ab nächster Woche.'}
  else if(ev.prog==='nein'&&ev.feel==='ueber'){c.volAdjust.grund--;msg='Stagnation + überlastet → −1 Satz pro Grundübung ab nächster Woche.'}
  else if(ev.prog==='nein'&&ev.feel==='unter'){c.volAdjust.iso++;msg='Stagnation + unterfordert → +1 Satz pro Isolationsübung (Feintuning).'}
  else if(ev.prog==='ja'&&ev.feel==='ueber'){msg='Starke Progression trotz Überlastung — das kann der Preis für optimalen Fortschritt sein. Volumen bleibt.'}
  c.week++;save();closeModal();
  modal(`<h3>${WEEKS[c.week]} beginnt</h3><div class="${msg.startsWith('Volumen bleibt')||msg.startsWith('Starke')?'good':'hint'}">${msg}</div>
  <p class="mut sm" style="margin-top:10px">${WEEK_INFO[c.week]}</p><button class="btn" onclick="closeModal();render()">Los geht's</button>`);
}

/* ============ POST-MESO ============ */
function openPostMeso(){
  modal(`<h3>Zyklus-Auswertung</h3><p class="mut sm">Post-Mesozyklus-Evaluation nach Trainingspedia Pro.</p>
  <label class="fld">Hast du die vorgegebenen Gewichte bewältigt?</label>
  <div class="seg2" id="pmW"><button class="on" onclick="pick(this)" data-v="ja">Ja</button><button onclick="pick(this)" data-v="nein">Nein</button></div>
  <label class="fld">Overreaching-Symptome erst in Woche 4 gespürt?</label>
  <div class="seg2" id="pmO"><button class="on" onclick="pick(this)" data-v="ja">Ja</button><button onclick="pick(this)" data-v="nein">Nein</button></div>
  <label class="fld">Auslastung in Woche 4</label>
  <div class="seg2" id="pmR"><button class="on" onclick="pick(this)" data-v="01">RIR 0-1</button><button onclick="pick(this)" data-v="23">RIR 2-3</button><button onclick="pick(this)" data-v="45">RIR 4-5</button></div>
  <button class="btn" onclick="applyPostMeso()">Auswerten</button>`);
}
function applyPostMeso(){
  const w=segVal('pmW'),o=segVal('pmO'),r=segVal('pmR');
  let factor=1,msg='';
  if(w==='nein'){
    if(o==='ja'){factor=1;msg='Gewichte nicht geschafft, aber erst spät overreached → Volumen war etwas zu hoch. 1RM bleibt, reduziere ggf. Sätze.'}
    else{factor=0.93;msg='Gewichte nicht geschafft ohne spätes Overreaching → 1RM-Werte werden um ~7% reduziert.'}
  } else {
    if(r==='01'){factor=1.025;msg='Stark! RIR 0-1 erreicht → 1RM-Werte leicht erhöht (+2,5%).'}
    else if(r==='23'){factor=1.05;msg='Du hattest Reserven (RIR 2-3) → 1RM-Werte erhöht (+5%).'}
    else{factor=1.075;msg='Viel Luft (RIR 4-5) → 1RM-Werte deutlich erhöht (+7,5%). Erwäge zusätzlich mehr Volumen.'}
  }
  window._pmFactor=factor;
  closeModal();
  modal(`<h3>Empfehlung</h3><div class="hint">${msg}</div>
  <button class="btn" onclick="nextCycle(true)">Neuen Zyklus starten (Werte übernehmen)</button>
  <button class="btn sec sm2" onclick="nextCycle(false)">Reset — bei null starten</button>`);
}
function nextCycle(carry){
  const d=P(),c=d.cycle,plan=currentPlan();
  d.history.push({planName:plan.name,start:c.start,end:new Date().toLocaleDateString('de-DE'),
    sessions:c.sessions.filter(s=>s.done).length,e1rm:{...c.e1rm}});
  if(carry){
    const f=window._pmFactor||1;
    const e1={};Object.entries(c.e1rm).forEach(([k,v])=>e1[k]=Math.round(v*f*10)/10);
    d.cycle={planId:c.planId,week:0,start:new Date().toLocaleDateString('de-DE'),e1rm:e1,flags:{},volAdjust:{...c.volAdjust},sessions:[],evals:{}};
    toast('Neuer Zyklus — Gewichte angepasst übernommen');
  } else {d.cycle=null;toast('Zyklus archiviert — Neustart möglich');}
  save();closeModal();go('home');
}

function addSlotDlg(pid,di){

function addSlot(pid,di){
  const exId=slEx.value;const ex=exObj(exId);
  let scheme=segVal('slScheme');
  if(ex.muscle==='Waden')scheme='amrap'; // Waden immer AMRAP

function editExDlg(exId){
  const e=exId?exObj(exId):{name:'',muscle:'',type:'iso',equipment:''};

  <label class="fld">Gerät / Equipment</label><input id="exE" value="${esc(e.equipment||'')}">
  ${exId?'<p class="mut sm" style="margin-top:8px">Hinweis: Wenn du das Gerät wechselst, wird das Gewicht dieser Übung neu kalibriert (Maschinen sind nicht 1:1 vergleichbar).</p>':''}
  <button class="btn" onclick="saveEx('${exId||''}')">Speichern</button>`);

function saveEx(exId){
  const d=P();
  const vals={name:exN.value.trim(),muscle:exM.value.trim(),type:segVal('exT'),equipment:exE.value.trim()};
  if(!vals.name)return;
  if(exId){
    const e=exObj(exId);
    const eqChanged=e.equipment!==vals.equipment;
    Object.assign(e,vals);
    if(eqChanged&&d.cycle&&d.cycle.e1rm[exId]!=null){
      delete d.cycle.e1rm[exId];
      toast('Gerät gewechselt — Übung wird neu kalibriert');
    }
  } else d.exercises.push(Object.assign({id:uid()},vals));
  save();closeModal();render();
}

/* ============ IMPORT ============ */
function importDlg(){
  modal(`<h3>Plan importieren</h3><p class="mut sm">Format pro Zeile:<br><b>Übung, Grund|Iso, Sätze, Wdh, [TB], [Gerät]</b><br>Tage mit [Tagname] markieren. Wdh „5-6/8-10" oder TB = Top & Backoff. „AMRAP" für Waden & Co.</p>
  <textarea id="impTxt" placeholder="[Push A]
Bankdrücken, Grund, 4, 6-8, Langhantel
Brustpresse, Grund, 2, 5-6/8-10, TB, Panatta
Seitheben, Iso, 4, 8-10
Wadenheben, Iso, 4, AMRAP"></textarea>
  <label class="fld">Planname</label><input id="impName" placeholder="Importierter Plan">
  <button class="btn" onclick="doImport()">Importieren</button>`);
}
function doImport(){
  const d=P();const lines=impTxt.value.split('\n').map(l=>l.trim()).filter(Boolean);
  const plan={id:uid(),name:impName.value.trim()||'Importierter Plan',days:[]};
  let cur=null,errs=0;
  lines.forEach(l=>{
    const m=l.match(/^\[(.+)\]$/);
    if(m){cur={name:m[1].trim(),slots:[]};plan.days.push(cur);return}
    if(!cur){cur={name:'Tag 1',slots:[]};plan.days.push(cur)}
    const parts=l.split(',').map(x=>x.trim());
    if(parts.length<4){errs++;return}
    const [name,typRaw,setsRaw,repsRaw,...rest]=parts;
    const typ=/grund/i.test(typRaw)?'grund':'iso';
    const sets=Math.max(1,parseInt(setsRaw)||3);
    let scheme='straight',reps=repsRaw,topReps=null;
    if(/amrap/i.test(repsRaw)){scheme='amrap';reps='AMRAP'}
    else if(repsRaw.includes('/')){scheme='tb';const[t,b]=repsRaw.split('/').map(x=>x.trim());topReps=t;reps=b}
    let equipment='';
    rest.forEach(x=>{if(/^tb$/i.test(x))scheme='tb';else equipment=x});
    if(scheme==='tb'&&!topReps)topReps='5-6';
    // Übung finden oder anlegen
    let ex=d.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
    if(!ex){ex={id:uid(),name,muscle:/wade/i.test(name)?'Waden':'',type:typ,equipment};d.exercises.push(ex)}
    if(/wade/i.test(name)||ex.muscle==='Waden'){scheme='amrap';reps='AMRAP'}
    const slot={exId:ex.id,sets,reps,scheme};
    if(scheme==='tb'){slot.topReps=topReps;slot.topSets=1}
    cur.slots.push(slot);
  });
  if(!plan.days.some(dy=>dy.slots.length)){toast('Nichts importiert — Format prüfen');return}
  d.plans.push(plan);save();closeModal();render();
  toast('Plan importiert'+(errs?` (${errs} Zeilen übersprungen)`:''));
}

/* ============ MEHR ============ */
function vMore(){
  const d=P(),c=d.cycle;
  let h=`<div class="card"><h2>1RM-Werte (aktueller Zyklus)</h2>`;
  if(c&&Object.keys(c.e1rm).length){
    Object.entries(c.e1rm).forEach(([exId,v])=>{
      h+=`<div class="listitem"><div class="ttl sm">${esc(exName(exId))}</div><div class="num" style="color:var(--gold);font-weight:700">${fmtW(r25(v))}</div></div>`;
    });
  } else h+='<div class="empty">Noch keine kalibrierten Werte.<br>Werden beim ersten Training automatisch erfasst.</div>';
  h+='</div>';
  h+=`<div class="card"><h2>Daten</h2>
  <button class="btn sec sm2" onclick="exportData()">Backup exportieren (JSON)</button>
  <button class="btn sec sm2" onclick="importDataDlg()">Backup importieren</button>
  <button class="btn danger sm2" onclick="if(confirm('Wirklich ALLE Daten dieses Profils löschen?')){S.data[S.active]=newProfileData();save();render()}">Profildaten zurücksetzen</button></div>
  <div class="card"><h2>Info</h2><p class="sm mut">IRON LOG · 5-Wochen-Mesozyklus nach Trainingspedia Pro.<br>Alle Daten liegen lokal auf diesem Gerät (localStorage).<br>Tipp: Safari → Teilen → „Zum Home-Bildschirm" für App-Gefühl.</p></div>`;
  return h;
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ironlog-backup.json';a.click();
}
function importDataDlg(){
  modal(`<h3>Backup importieren</h3><p class="mut sm">Füge den JSON-Inhalt ein. Überschreibt alle Daten!</p>
  <textarea id="impJson"></textarea><button class="btn" onclick="try{S=JSON.parse(impJson.value);save();closeModal();render();toast('Importiert ✓')}catch(e){toast('Ungültiges JSON')}">Importieren</button>`);
}

load();render();
